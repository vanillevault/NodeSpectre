<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NVLL — Embassy</title>
  <link rel="stylesheet" href="css/gh0stnet.css">
  <style>
    body {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .terminal-wrapper {
      width: 100%;
      max-width: 720px;
    }

    .terminal-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      background: #0a0a0a;
      border: 1px solid #1a1a1a;
      border-bottom: none;
    }

    .terminal-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #1a1a1a;
    }

    .terminal-dot:first-child { background: #ff5f57; }
    .terminal-dot:nth-child(2) { background: #febc2e; }
    .terminal-dot:nth-child(3) { background: #28c840; }

    .terminal-title {
      margin-left: auto;
      margin-right: auto;
      font-size: 11px;
      color: rgba(255,255,255,0.2);
      letter-spacing: 0.15em;
    }

    .terminal-body {
      background: #050505;
      border: 1px solid #1a1a1a;
      padding: 24px;
      min-height: 420px;
      max-height: 60vh;
      overflow-y: auto;
      font-size: 13px;
      line-height: 1.8;
    }

    .terminal-body::-webkit-scrollbar {
      width: 4px;
    }

    .terminal-body::-webkit-scrollbar-track {
      background: transparent;
    }

    .terminal-body::-webkit-scrollbar-thumb {
      background: #1a1a1a;
    }

    .terminal-line {
      color: rgba(255,255,255,0.6);
      white-space: pre-wrap;
    }

    .terminal-input-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 14px 24px;
      background: #050505;
      border: 1px solid #1a1a1a;
      border-top: 1px solid rgba(0,229,200,0.15);
    }

    .terminal-prompt {
      color: rgba(255,255,255,0.2);
      font-size: 13px;
      white-space: nowrap;
      font-family: 'Share Tech Mono', monospace;
    }

    .terminal-prompt span {
      color: #00e5c8;
    }

    #terminal-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: #00e5c8;
      font-family: 'Share Tech Mono', monospace;
      font-size: 13px;
      caret-color: #00e5c8;
    }

    .bottom-label {
      margin-top: 24px;
      font-size: 10px;
      color: rgba(255,255,255,0.15);
      letter-spacing: 0.3em;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="terminal-wrapper">
    <div class="terminal-header">
      <div class="terminal-dot"></div>
      <div class="terminal-dot"></div>
      <div class="terminal-dot"></div>
      <span class="terminal-title">nvll@embassy — terminal</span>
    </div>

    <div class="terminal-body" id="terminal-output"></div>

    <div class="terminal-input-row">
      <span class="terminal-prompt"><span>nvll</span>@embassy:~$</span>
      <input type="text" id="terminal-input" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" autofocus>
    </div>
  </div>

  <p class="bottom-label">// NVLL EMBASSY — origin: Andorra — relay: 3ms</p>

  <script src="js/terminal.js"></script>
</body>
</html>
